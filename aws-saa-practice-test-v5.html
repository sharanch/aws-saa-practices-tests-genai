{d:"High-Performing Architectures",t:"DataSync",q:"A company needs to migrate 500 TB of data from an on-premises NAS to Amazon S3 within 2 weeks. The on-premises connection is a 1 Gbps Direct Connect link. Manual copy scripts using the AWS CLI are too slow. What service accelerates this migration?",o:["Use S3 Transfer Acceleration on the destination bucket to speed up uploads","Deploy AWS DataSync agents on-premises — DataSync optimizes network utilisation with multi-threaded parallelism, online verification, and automatic scheduling, saturating the Direct Connect link","Use AWS Snowball Edge devices to physically ship the data","Use AWS Storage Gateway File Gateway to mount S3 and copy files"],a:1,e:"AWS DataSync optimizes data transfer by using parallel, multi-threaded connections and saturating available bandwidth. Over a 1 Gbps Direct Connect link, DataSync can transfer up to ~10 TB per day, achieving 500 TB in ~50 days at full throttle — but combined with higher bandwidth or multiple agents, the target is achievable. For very large migrations (>100 TB), Snowball Edge is also valid; DataSync is ideal when Direct Connect bandwidth is available and the timeline is achievable."}
];


// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
var cur=0, ans=new Array(Q.length).fill(null), flagged=new Set(), checked=new Set();
var secondsLeft=130*60, timerInt=null, submitted=false;

// ─────────────────────────────────────────────
//  TIMER
// ─────────────────────────────────────────────
function startTimer(){
  timerInt=setInterval(function(){
    if(secondsLeft<=0){clearInterval(timerInt);submitTest();return;}
    secondsLeft--;
    var h=Math.floor(secondsLeft/3600),m=Math.floor((secondsLeft%3600)/60),s=secondsLeft%60;
    var el=document.getElementById('timer');
    el.textContent=(h<10?'0':'')+h+':'+(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
    if(secondsLeft<600)el.classList.add('warn');
  },1000);
}

// ─────────────────────────────────────────────
//  RENDER QUESTION
// ─────────────────────────────────────────────
function renderQ(i){
  cur=i;
  var q=Q[i];
  document.getElementById('qdomain').textContent=q.d;
  document.getElementById('qnum').textContent='Question '+(i+1)+' of '+Q.length+' \u2014 '+q.t;
  document.getElementById('qtxt').textContent=q.q;
  var letters=['A','B','C','D'], oc=document.getElementById('qopts');
  oc.innerHTML='';
  q.o.forEach(function(opt,j){
    var div=document.createElement('div');
    div.className='opt';
    if(ans[i]===j) div.classList.add('sel');
    if(checked.has(i)){
      if(j===q.a) div.classList.add('cor');
      else if(ans[i]===j && j!==q.a) div.classList.add('wrg');
    }
    div.innerHTML='<div class="oltr">'+letters[j]+'</div><div class="otxt">'+opt+'</div>';
    if(!checked.has(i))(function(jj){div.onclick=function(){selectOpt(jj);};})(j);
    oc.appendChild(div);
  });
  document.getElementById('qexptxt').textContent=q.e;
  document.getElementById('qexp').className='exp'+(checked.has(i)?' show':'');
  var cb=document.getElementById('chkb');
  cb.disabled=ans[i]===null||checked.has(i);
  cb.textContent=checked.has(i)?'\u2713 Checked':'Check Answer';
  var fb=document.getElementById('flgb');
  fb.className='btn btn-g flgb'+(flagged.has(i)?' on':'');
  fb.textContent=flagged.has(i)?'\u2691 Flagged':'\u2691 Flag';
  document.getElementById('prevb').disabled=i===0;
  document.getElementById('nextb').textContent=i===Q.length-1?'Finish \u2192':'Next \u2192';
  updateGrid(); updateStats();
}

function selectOpt(j){ans[cur]=j; renderQ(cur);}
function checkAns(){if(ans[cur]===null)return; checked.add(cur); renderQ(cur);}
function toggleFlag(){flagged.has(cur)?flagged.delete(cur):flagged.add(cur); renderQ(cur);}
function nav(d){var n=cur+d; if(n<0||n>=Q.length)return; renderQ(n); window.scrollTo(0,0);}

// ─────────────────────────────────────────────
//  SIDEBAR
// ─────────────────────────────────────────────
function buildGrid(){
  var g=document.getElementById('qgrid'); g.innerHTML='';
  Q.forEach(function(_,i){
    var b=document.createElement('button');
    b.className='qb'; b.textContent=i+1;
    (function(ii){b.onclick=function(){renderQ(ii);};})(i);
    g.appendChild(b);
  });
}
function updateGrid(){
  document.querySelectorAll('.qb').forEach(function(b,i){
    b.className='qb';
    if(ans[i]!==null) b.classList.add('ans');
    if(flagged.has(i)) b.classList.add('flg');
    if(i===cur) b.classList.add('act');
  });
}
function updateStats(){
  document.getElementById('ac').textContent=ans.filter(function(a){return a!==null;}).length;
  document.getElementById('fc').textContent=flagged.size;
}

// ─────────────────────────────────────────────
//  SAVE / LOAD
// ─────────────────────────────────────────────
function save(){
  localStorage.setItem('saa-c03-set2',JSON.stringify({ans:ans,flagged:[...flagged],checked:[...checked],cur:cur,secondsLeft:secondsLeft,at:new Date().toISOString()}));
  var sb=document.getElementById('sb'); sb.classList.add('show');
  setTimeout(function(){sb.classList.remove('show');},2200);
}
function load(){
  var raw=localStorage.getItem('saa-c03-set2');
  if(!raw){alert('No saved progress found.');return;}
  var s=JSON.parse(raw);
  ans=s.ans; flagged=new Set(s.flagged); checked=new Set(s.checked);
  secondsLeft=s.secondsLeft||secondsLeft;
  alert('Loaded! Saved at '+new Date(s.at).toLocaleString());
  renderQ(s.cur||0);
}

// ─────────────────────────────────────────────
//  SUBMIT
// ─────────────────────────────────────────────
function askSubmit(){
  var u=ans.filter(function(a){return a===null;}).length;
  if(u>0&&!confirm(u+' question(s) unanswered. Submit anyway?'))return;
  submitTest();
}

function submitTest(){
  if(submitted)return; submitted=true; clearInterval(timerInt);

  // ── score calculations ──
  var correct=ans.filter(function(a,i){return a===Q[i].a;}).length;
  var pct=Math.round((correct/Q.length)*100);
  var pass=pct>=72;

  // domain breakdown
  var domains={};
  Q.forEach(function(q,i){
    if(!domains[q.d])domains[q.d]={c:0,t:0};
    domains[q.d].t++;
    if(ans[i]===q.a)domains[q.d].c++;
  });

  // topic breakdown
  var topics={};
  Q.forEach(function(q,i){
    if(!topics[q.t])topics[q.t]={c:0,t:0,d:q.d,wrong:[]};
    topics[q.t].t++;
    if(ans[i]===q.a) topics[q.t].c++;
    else topics[q.t].wrong.push(i);
  });

  // missed questions list
  var missed=[];
  Q.forEach(function(q,i){
    if(ans[i]!==null && ans[i]!==q.a){
      missed.push({i:i,q:q,chosen:ans[i]});
    }
  });

  // hide test UI
  document.querySelector('.layout').style.display='none';
  document.querySelector('header').style.display='none';

  var rs=document.getElementById('rs');
  rs.style.display='block';

  // ── domain bars html ──
  var domainColors={'Secure Architectures':'#00d4aa','Resilient Architectures':'#f5a623','High-Performing Architectures':'#7c83ff','Cost-Optimized Architectures':'#ff6b9d'};
  var drows=Object.entries(domains).map(function(e){
    var name=e[0],d=e[1],p=Math.round((d.c/d.t)*100);
    var color=domainColors[name]||'var(--accent2)';
    var tag=p>=80?'<span class="dtag strong">Strong</span>':p>=65?'<span class="dtag ok">Review</span>':'<span class="dtag weak">Weak</span>';
    return '<div class="dr"><div class="dn">'+name+'</div><div class="dbw"><div class="dbb" style="width:'+p+'%;background:'+color+'"></div></div><div class="ds">'+d.c+'/'+d.t+' ('+p+'%)</div>'+tag+'</div>';
  }).join('');

  // ── weak topics html ──
  var topicEntries=Object.entries(topics).sort(function(a,b){
    var pa=a[1].c/a[1].t, pb=b[1].c/b[1].t; return pa-pb;
  });
  var weakTopics=topicEntries.filter(function(e){return e[1].c/e[1].t<0.7;}).slice(0,6);
  var topicHtml='';
  if(weakTopics.length===0){
    topicHtml='<p style="color:var(--success);font-size:13px;">&#10003; No major topic weaknesses detected. Great performance across the board!</p>';
  } else {
    topicHtml=weakTopics.map(function(e){
      var name=e[0],td=e[1],p=Math.round((td.c/td.t)*100);
      var cls=p<50?'critical':'caution', scls=p<50?'critical':'caution';
      var tips=getTopicTip(name);
      return '<div class="topic-card '+cls+'"><div class="tc-header"><span class="tc-name">'+name+'</span><span class="tc-score '+scls+'">'+td.c+'/'+td.t+' ('+p+'%)</span></div><div class="tc-desc">'+tips+'</div></div>';
    }).join('');
  }

  // ── missed questions html ──
  var letters=['A','B','C','D'];
  var missedHtml='';

  rs.innerHTML=

      '<div class="sring"><div class="spct" style="color:'+(pass?'var(--success)':'var(--danger)')+'">'+pct+'%</div><div class="slbl">SCORE</div></div>'+
    '</div>'+

    // SCORE CARDS
    '<div class="rgrid">'+
      '<div class="rc"><div class="rcv" style="color:var(--success)">'+correct+'</div><div class="rcl">Correct</div></div>'+

      '<div class="rc"><div class="rcv" style="color:var(--accent)">'+Q.length+'</div><div class="rcl">Total Qs</div></div>'+
      '<div class="rc"><div class="rcv" style="color:var(--accent2)">'+(pass?'PASS':'FAIL')+'</div><div class="rcl">Result \u226572%</div></div>'+

    // DOMAIN PERFORMANCE

// ─────────────────────────────────────────────
//  TOPIC TIPS MAP
// ─────────────────────────────────────────────
var TIPS={
  "S3 Security":"Review S3 Block Public Access, Bucket Policies, ACLs, and the difference between account-level vs bucket-level controls.",
  "Organizations & SCPs":"Focus on how SCPs interact with IAM policies, the difference between Deny and Allow in SCPs, and inheritance through OU hierarchy.",
  "DDoS & WAF":"Study AWS WAF rule types (rate-based, managed rule groups), Shield Standard vs Advanced, and how they attach to ALB/CloudFront.",
  "IAM Roles & Credentials":"Revise IAM role trust policies, instance profiles, temporary credentials via STS, and why hard-coded keys are always wrong.",
  "Secrets Manager":"Understand Secrets Manager vs Parameter Store, automatic rotation mechanics, and how consuming applications retrieve secrets.",
  "Encryption in Transit":"Study TLS termination points, mTLS, ACM certificates, and the difference between in-transit and at-rest encryption.",
  "S3 Object Lock":"Know the difference between Governance and Compliance mode, WORM requirements, and how Object Lock relates to Versioning.",
  "Identity Federation":"Review SAML 2.0, OIDC, IAM Identity Center, AD Connector, and the difference between federation and IAM users.",
  "CloudTrail & Audit":"Understand Organization Trails, log file validation, S3 MFA Delete, and how to detect tampering of audit logs.",
  "Cross-Account Access":"Study STS AssumeRole, trust policies, external IDs for third-party roles, and the principle of least privilege across accounts.",
  "CloudFront & OAC":"Revise Origin Access Control vs legacy OAI, signed URLs vs signed cookies, cache behaviours, and TTL configuration.",
  "IaC Security":"Learn CloudFormation Hooks, AWS Config proactive checks, SCPs for preventive vs detective controls in IaC pipelines.",
  "Cognito & Identity":"Study User Pools vs Identity Pools, token flows (OAuth/OIDC), and policy variables for fine-grained S3 access.",
  "Security Hub & GuardDuty":"Understand the difference between GuardDuty (threat detection), Inspector (vulnerability scanning), Macie (data classification), and Security Hub (aggregation).",
  "Session Manager":"Review SSM agent requirements, IAM permissions for Session Manager, session logging, and port-forwarding capability.",
  "CloudHSM":"Understand FIPS 140-2 Level 2 (KMS) vs Level 3 (CloudHSM), shared vs dedicated HSM, and use cases for each.",
  "VPC Endpoints":"Know Gateway Endpoints (S3, DynamoDB — free) vs Interface Endpoints (PrivateLink — charged), and when each is used.",
  "SNS / SQS Fan-out":"Review the fan-out pattern, message filtering policies, SQS Standard vs FIFO, and when to use each combination.",
  "RDS Multi-AZ":"Understand Multi-AZ vs Read Replicas — Multi-AZ is for HA/failover, Read Replicas are for read scaling. The standby does NOT serve reads.",
  "Spot & SQS Resilience":"Study SQS visibility timeout mechanics, how it interacts with Spot interruptions, and the importance of idempotent consumers.",
  "Multi-AZ Design":"Review the requirement to span all tiers across at least 2 AZs, Auto Scaling group configuration, and ALB health checks.",
  "Decoupling Patterns":"Understand synchronous vs asynchronous coupling, SQS as a buffer, and the resilience benefits of loose coupling.",
  "Cross-Region DR":"Revise RTO/RPO definitions, the spectrum of DR strategies (backup→pilot light→warm standby→active-active), and CRR mechanics.",
  "Chaos Engineering":"Understand AWS FIS experiment templates, stop conditions, and the purpose of chaos engineering in building resilient systems.",
  "Route 53 Failover":"Study Route 53 routing policies (failover, weighted, latency, geolocation), health checks, and alias vs non-alias records.",
  "Stateless EC2 / Session State":"Review the principle of stateless EC2, ElastiCache for session storage, and why sticky sessions are an anti-pattern at scale.",
  "SQS Dead Letter Queue":"Understand the redrive policy, maxReceiveCount, DLQ configuration, and how to replay messages from a DLQ.",
  "Kinesis Ordering":"Study Kinesis partition keys, shard consumers, and how ordering is guaranteed within a shard but not across shards.",
  "EC2 Auto Recovery":"Revise System vs Instance status checks, Auto Recovery vs Auto Scaling replacement, and what is preserved during recovery.",
  "Storage Gateway":"Know the three Gateway types (File, Volume, Tape), File Gateway NFS/SMB interface, and the local cache mechanism.",
  "S3 Lifecycle & Storage Classes":"Study all S3 storage classes, minimum storage durations, retrieval times, and how to design cost-optimal lifecycle transitions.",
  "Kinesis Error Handling":"Review bisectBatchOnFunctionError, maximumRetryAttempts, failure destinations, and how to prevent shard blockage.",
  "DynamoDB Global Tables":"Understand active-active vs active-passive replication, conflict resolution in Global Tables, and the difference from DynamoDB Streams replication.",
  "Multi-Region Lambda":"Study Route 53 health checks with API Gateway, the trade-offs of Lambda@Edge vs multi-region deployments, and failover latency.",
  "RDS Proxy":"Understand connection pooling, how RDS Proxy reduces database connection overhead, and its compatibility with Lambda.",
  "CloudFront":"Revise CloudFront cache behaviours, TTL settings, invalidation, signed URLs, Lambda@Edge, and Origin Request Policies.",
  "Redshift":"Study Redshift columnar storage, MPP architecture, Redshift Serverless, and when to use Redshift vs Athena vs RDS.",
  "EFS vs EBS":"Know EFS (shared, NFS, multi-AZ) vs EBS (block, single-AZ, single-instance) vs S3 (object, durable), and when to use each.",
  "RDS Read Replicas":"Understand that Multi-AZ standby CANNOT serve reads. Read Replicas are asynchronous and for read scaling, not HA.",
  "ElastiCache":"Study Redis vs Memcached differences, cache-aside vs read-through patterns, TTL design, and cluster mode.",
  "Placement Groups":"Know Cluster (low latency, same rack), Spread (fault isolation, different racks), and Partition (large distributed systems).",
  "Kinesis Data Streams":"Study KDS shards, partition keys, retention, enhanced fan-out consumers, and when to use KDS vs SQS vs SNS.",
  "DynamoDB Key Design":"Review partition key design, composite keys, GSIs vs LSIs, access pattern-driven design, and hot partition avoidance.",
  "CloudFront API Caching":"Understand Cache-Control headers, CloudFront cache key configuration, and how to cache API responses safely.",
  "EMR":"Know EMR vs Glue vs Athena use cases, EMR Serverless, instance fleet vs instance group, and when each is appropriate.",
  "S3 Performance":"Study S3 request rate limits per prefix, randomised prefix strategy, S3 Transfer Acceleration, and multipart upload.",
  "DAX":"Understand DAX as a read-through/write-through cache for DynamoDB, its SDK compatibility, and microsecond read latency.",
  "Transcoding Pipeline":"Review Lambda timeout limits, SQS-triggered Auto Scaling patterns, and when Lambda is not the right compute choice.",
  "GPU & Spot":"Know GPU instance families (P3, G4dn), Spot Fleet diversification, checkpointing strategies, and interruption handling.",
  "Global Accelerator":"Understand Global Accelerator (Anycast IPs, TCP/UDP, non-HTTP) vs CloudFront (HTTP/S, caching) — they serve different use cases.",
  "Savings Plans":"Study Compute vs EC2 Instance Savings Plans, Savings Plan vs Reserved Instances trade-offs, and commitment term effects.",
  "Dev Environment Scheduling":"Review EventBridge scheduler, EC2 start/stop automation, and the cost impact of eliminating idle hours.",
  "Lambda Cost Optimization":"Understand GB-seconds billing, Lambda Power Tuning, Provisioned Concurrency cost, and right-sizing strategies.",
  "S3 Storage Tiers":"Memorise all S3 storage class costs, minimum storage durations, and retrieval times for the exam.",
  "Direct Connect Egress":"Study Direct Connect pricing vs internet egress, hosted vs dedicated connections, and virtual interfaces.",
  "ECS Fargate":"Understand Fargate vs EC2 launch type cost model, task sizing, and when Fargate is more cost-effective.",
  "CloudFront S3 Cost":"Understand how CloudFront reduces S3 GET request costs for cacheable static content.",
  "Aurora Serverless":"Study Aurora Serverless v1 vs v2 differences, ACU scaling increments, pause/resume, and variable workload cost savings.",
  "Consolidated Billing":"Review how RI and Savings Plan sharing works across accounts in an Organization with consolidated billing.",
  "NAT Gateway Cost":"Know Gateway Endpoint (free for S3/DynamoDB) vs NAT Gateway cost structure (hourly + data processing).",
  "Spot for Transcoding":"Study Spot Fleet, capacity pools, diversification strategies, checkpointing, and Spot Instance interruption notices.",
  "S3 Lifecycle Policy":"Know all S3 storage classes in order of cost, transition rules (minimum days), and how to match business retention requirements."
};

function getTopicTip(name){
  return TIPS[name]||'Review the core AWS documentation and FAQs for this topic.';
}

// ─────────────────────────────────────────────
//  BUILD FEEDBACK NARRATIVE
// ─────────────────────────────────────────────
function buildFeedback(domains,topics,pct,pass,missed){
  var domArr=Object.entries(domains).map(function(e){return {name:e[0],pct:Math.round((e[1].c/e[1].t)*100),c:e[1].c,t:e[1].t};});
  domArr.sort(function(a,b){return a.pct-b.pct;});
  var weakDoms=domArr.filter(function(d){return d.pct<65;});
  var strongDoms=domArr.filter(function(d){return d.pct>=80;});

  var topicArr=Object.entries(topics).map(function(e){return {name:e[0],pct:Math.round((e[1].c/e[1].t)*100),d:e[1].d,wrong:e[1].wrong};});
  topicArr.sort(function(a,b){return a.pct-b.pct;});
  var critTopics=topicArr.filter(function(t){return t.pct<50;}).slice(0,3);
  var cautTopics=topicArr.filter(function(t){return t.pct>=50&&t.pct<70;}).slice(0,4);

  var html='';

  // Overall verdict
  html+='<h3>Overall Assessment</h3>';
  if(pct>=85){
    html+='<p>Excellent result. You scored <strong>'+pct+'%</strong> which comfortably exceeds the AWS passing threshold of ~72%. Your understanding of AWS solution architecture is strong across all four domains. Focus remaining effort on the specific topics flagged below to maximise your real exam margin.</p>';
  } else if(pct>=72){
    html+='<p>Good result — you scored <strong>'+pct+'%</strong> and would pass if this were the real exam. However, the margin above the ~72% threshold is '+( pct-72)+'%. A few shaky topics could tip the balance on exam day. Address the gaps below before booking your slot.</p>';
  } else if(pct>=60){
    html+='<p>You scored <strong>'+pct+'%</strong> — close but below the passing threshold. You have a solid foundation but specific domains and topics are dragging your score down. With focused study on the areas identified below, you should be ready within 2–3 weeks.</p>';
  } else {
    html+='<p>You scored <strong>'+pct+'%</strong>. There are foundational gaps across multiple domains. This is not a bad thing at this stage of preparation — it tells you exactly where to direct your energy. Work through the study plan below systematically before attempting the exam.</p>';
  }

  // Domain-level breakdown commentary
  html+='<h3>Domain Analysis</h3>';
  if(strongDoms.length>0){
    var sNames=strongDoms.map(function(d){return '<span class="pill">'+d.name+' ('+d.pct+'%)</span>';}).join(' ');
    html+='<p><strong>Strengths:</strong> '+sNames+' — These domains are solid. Maintain your knowledge here but prioritise time on weaker areas.</p>';
  }
  if(weakDoms.length>0){
    weakDoms.forEach(function(d){
      html+='<p><span class="pill red">'+d.name+' — '+d.pct+'%</span> ';
      if(d.name==='Secure Architectures'){
        html+='Secure Architectures carries the highest exam weight (30%). Gaps here have the biggest impact on your overall score. Focus on IAM, KMS, VPC security, and WAF/Shield scenarios.';
      } else if(d.name==='Resilient Architectures'){
        html+='Resilient Architectures (26% weight) tests your understanding of HA, fault tolerance, and decoupling patterns. Review Multi-AZ vs Multi-Region strategies and the SNS/SQS/Kinesis patterns.';
      } else if(d.name==='High-Performing Architectures'){
        html+='High-Performing Architectures (24% weight) requires knowing which caching, compute, and database service fits which scenario. Pay attention to CloudFront vs Global Accelerator and DAX vs ElastiCache distinctions.';
      } else if(d.name==='Cost-Optimized Architectures'){
        html+='Cost-Optimized Architectures (20% weight) focuses on choosing the right pricing model and storage tier. Practice matching workload characteristics (predictable, bursty, fault-tolerant) to the right pricing option.';
      }
      html+='</p>';
    });
  } else {
    html+='<p>All domains are above the 65% threshold. Your knowledge is well-distributed. Focus on the specific topics below to eliminate remaining weaknesses.</p>';
  }

  // Critical topic failures
  if(critTopics.length>0){
    html+='<h3>Critical Gaps (Below 50%)</h3>';
    html+='<p>These topics show the most significant knowledge gaps and should be your first priority:</p><ul>';
    critTopics.forEach(function(t){
      html+='<li><strong>'+t.name+'</strong> <span class="pill red">'+t.pct+'%</span> — '+getTopicTip(t.name)+'</li>';
    });
    html+='</ul>';
  }

  // Caution topics
  if(cautTopics.length>0){
    html+='<h3>Topics Needing Review (50–69%)</h3>';
    html+='<ul>';
    cautTopics.forEach(function(t){
      html+='<li><strong>'+t.name+'</strong> <span class="pill yellow">'+t.pct+'%</span> — '+getTopicTip(t.name)+'</li>';
    });
    html+='</ul>';
  }

  // Common mistake patterns
  if(missed.length>0){
    html+='<h3>Common Mistake Patterns</h3>';
    var multiAZmistake=missed.some(function(m){return m.q.t==='RDS Multi-AZ'||m.q.t==='RDS Read Replicas';});
    var securitymistake=missed.filter(function(m){return m.q.d==='Secure Architectures';}).length>=3;
    var costmistake=missed.filter(function(m){return m.q.d==='Cost-Optimized Architectures';}).length>=3;
    if(multiAZmistake) html+='<p>&#x26A0; <strong>Multi-AZ vs Read Replicas confusion detected.</strong> Remember: Multi-AZ = high availability and failover (standby is NOT readable). Read Replicas = read scaling (asynchronous, can be promoted). These are the most commonly confused RDS concepts on the SAA exam.</p>';
    if(securitymistake) html+='<p>&#x26A0; <strong>Security domain needs significant attention.</strong> With '+missed.filter(function(m){return m.q.d==='Secure Architectures';}).length+' security questions missed, revisit IAM fundamentals (roles vs users, trust policies), encryption patterns (KMS, CloudHSM), and VPC security layers (SGs, NACLs, endpoints).</p>';
    if(costmistake) html+='<p>&#x26A0; <strong>Cost optimisation patterns need work.</strong> Focus on understanding the full spectrum from Spot → Savings Plans → Reserved Instances, and S3 storage class transition rules including minimum duration charges.</p>';
    if(!multiAZmistake&&!securitymistake&&!costmistake) html+='<p>No strong mistake patterns detected across multiple questions in any single concept area. Review the individual missed questions above for targeted improvement.</p>';
  }

  // Exam readiness
  html+='<h3>Exam Readiness</h3>';
  if(pct>=80){
    html+='<p>You are exam-ready. Book your slot within the next 1–2 weeks while the material is fresh. Do one more full practice test the day before to consolidate memory. Focus light review on your weak topics only.</p>';
  } else if(pct>=72){
    html+='<p>Almost there. Spend 1 week focused on the critical and caution topics above, then take another full practice test. Aim for 80%+ on your next attempt before booking the real exam — this gives you a comfortable buffer.</p>';
  } else if(pct>=60){
    html+='<p>Give yourself 2–3 weeks of targeted study. Work through AWS official documentation for the critical gap topics, then revisit the practice test. Do not book the exam until you consistently score 78%+ on practice tests.</p>';
  } else {
    html+='<p>Dedicate 4–6 weeks to structured study using the AWS SAA-C03 Exam Guide as your syllabus. Build hands-on experience with the services where you have gaps — the exam heavily rewards practical understanding over memorisation. Retake this test after 3 weeks to measure progress.</p>';
  }

  return html;
}

// ─────────────────────────────────────────────
//  BUILD STUDY PLAN
// ─────────────────────────────────────────────
function buildStudyPlan(domains,topics,pct){
  var cards=[];
  var topicArr=Object.entries(topics).map(function(e){
    return {name:e[0],pct:Math.round((e[1].c/e[1].t)*100),d:e[1].d};
  }).sort(function(a,b){return a.pct-b.pct;});

  var critical=topicArr.filter(function(t){return t.pct<50;}).slice(0,2);
  var caution=topicArr.filter(function(t){return t.pct>=50&&t.pct<70;}).slice(0,2);
  var review=topicArr.filter(function(t){return t.pct>=70&&t.pct<85;}).slice(0,2);

  critical.forEach(function(t){
    cards.push('<div class="sp-card"><div class="sp-priority high">&#9679; Priority 1 — Critical</div><div class="sp-title">'+t.name+'</div><div class="sp-body">'+getTopicTip(t.name)+'</div></div>');
  });
  caution.forEach(function(t){
    cards.push('<div class="sp-card"><div class="sp-priority med">&#9679; Priority 2 — Review</div><div class="sp-title">'+t.name+'</div><div class="sp-body">'+getTopicTip(t.name)+'</div></div>');
  });
  review.forEach(function(t){
    cards.push('<div class="sp-card"><div class="sp-priority low">&#9679; Priority 3 — Polish</div><div class="sp-title">'+t.name+'</div><div class="sp-body">'+getTopicTip(t.name)+'</div></div>');
  });

  if(cards.length===0){
    cards.push('<div class="sp-card"><div class="sp-priority low">&#9679; All topics above 70%</div><div class="sp-title">Final Review</div><div class="sp-body">Take one more full-length timed practice test to consolidate memory under exam conditions. Focus on any remaining flagged questions.</div></div>');
  }

  // pad to 6 if needed
  while(cards.length<3){
    cards.push('<div class="sp-card"><div class="sp-priority low">&#9679; General</div><div class="sp-title">AWS Hands-On Practice</div><div class="sp-body">Build the services you\'re less familiar with in an AWS Free Tier account. Practical experience reinforces exam scenario reasoning.</div></div>');
  }

  return cards.slice(0,6).join('');
}

function reviewAnswers(){
  Q.forEach(function(_,i){if(ans[i]!==null)checked.add(i);});
  document.getElementById('rs').style.display='none';
  document.querySelector('.layout').style.display='grid';
  document.querySelector('header').style.display='flex';
  renderQ(0); window.scrollTo(0,0);
}
function restart(){
  ans=new Array(Q.length).fill(null); flagged=new Set(); checked=new Set();
  cur=0; secondsLeft=130*60; submitted=false;
  document.getElementById('rs').style.display='none';
  document.querySelector('.layout').style.display='grid';
  document.querySelector('header').style.display='flex';
  document.getElementById('timer').className='';
  startTimer(); renderQ(0);
}

buildGrid(); renderQ(0); startTimer();
setInterval(save, 120000);
